<!DOCTYPE html>
<html>
<head>

<title>My Thoughts</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
min-height:100vh;
font-family:"Open Sans",sans-serif;
color:white;
background:url("space.jpg.jpg") no-repeat center center fixed;
background-size:cover;
display:flex;
flex-direction:column;
align-items:center;
text-align:center;
padding:40px;
}

/* النجوم */
.starfield{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-1;
overflow:hidden;
}

.starfield::before,
.starfield::after{
content:"";
position:absolute;
width:200%;
height:200%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
animation:moveStars 60s linear infinite;
opacity:0.6;
}

.starfield::after{
animation-duration:120s;
opacity:0.4;
}

@keyframes moveStars{
from{transform:translate(0,0);}
to{transform:translate(-50%,-50%);}
}

/* العنوان */

h1{
font-size:40px;
margin-bottom:30px;
text-shadow:0 0 15px #00e5ff;
}

/* الرسائل */

.note{
max-width:600px;
margin-bottom:30px;
font-family:"Tajawal",sans-serif;
font-size:20px;
line-height:2;
text-shadow:0 0 6px rgba(255,255,255,0.3);
direction:rtl;
}

/* زر العودة */

button{
margin-top:40px;
padding:12px 35px;
font-size:18px;
border-radius:30px;
border:none;
background:#00e5ff;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
box-shadow:0 0 15px #00e5ff;
}

</style>
</head>

<body>

<div class="starfield"></div>

<h1>My Thoughts 💭</h1>

<div class="note">
أحيانًا تكون هناك أشياء كثيرة أريد قولها لك،
لكن الكلمات لا تأتي بسهولة دائمًا.
</div>

<div class="note">
لذلك قررت أن أكتب بعض تلك الأشياء هنا،
أشياء صغيرة لكنها صادقة.
</div>

<div class="note">
ربما ليست جملًا مثالية،
لكنها حقيقية.
</div>

<button onclick="goBack()">Back</button>

<audio id="bgMusic" src="music.mp3" autoplay loop></audio>

<script>

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
