<!DOCTYPE html>
<html>
<head>

<title>Click Here</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body {
    margin: 0;
    height: 100vh;
    font-family: "Open Sans", sans-serif;
    color: white;
    background: url("space.jpg.jpg") no-repeat center center fixed;
    background-size: cover;
}

/* شاشة كلمة السر */
#passwordScreen {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: rgba(0,0,0,0.4);
}

#passwordScreen input {
    padding: 10px 15px;
    border-radius: 20px;
    border: none;
    margin-top: 15px;
}

#passwordScreen button {
    margin-top: 15px;
    padding: 10px 25px;
    border-radius: 25px;
    border: 2px solid #00e5ff;
    background: transparent;
    color: #00e5ff;
    cursor: pointer;
}

#passwordScreen button:hover {
    background: #00e5ff;
    color: #0f0c29;
}

/* المحتوى */
#mainContent {
    display: none;
    height: 100vh;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
  
}

/* الأزرار */
.mainBtn {
    padding: 14px 40px;
    font-size: 20px;
    border-radius: 30px;
    border: none;
    background: #00e5ff;
    color: white;
    cursor: pointer;
    margin: 10px;
}

.mainBtn:hover {
    box-shadow: 0 0 15px #00e5ff;
}

/* الأقسام */
#counterSection { display: none; font-size: 50px; }
#messageSection { display: none; }
#thoughtsSection { display: none; }

/* نص */
h5 {
    font-size: 7vw;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #00e5ff; }
    to { text-shadow: 0 0 20px #8a2be2; }
}

.specialMessage {
    font-family: "Tajawal", sans-serif;
    font-size: 18px;
    max-width: 600px;
    line-height: 1.8;
    direction: rtl;
    opacity: 0;
    animation: fadeIn 2s forwards;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* النجوم */
.starfield {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

.starfield::before {
    content: "";
    position: absolute;
    width: 200%;
    height: 200%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 50px 50px;
    animation: moveStars 60s linear infinite;
}

@keyframes moveStars {
    from { transform: translate(0,0); }
    to { transform: translate(-50%, -50%); }
}

/* القلوب */
.heart {
    position: fixed;
    font-size: 22px;
    animation: floatUp 2.5s forwards;
}

@keyframes floatUp {
    to { transform: translateY(-150px); opacity: 0; }
}
.signature {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5); /* شفافية */
}




    #backBtn {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    color: #00e5ff;
    font-size: 20px;
    display: none;
    cursor: pointer;
    z-index: 999;
    transition: 0.3s;
}

#backBtn:hover {
    background: rgba(0, 229, 255, 0.2);
    transform: scale(1.1);
}

    
</style>
</head>

<body>

<div class="starfield"></div>

<!-- شاشة الدخول -->
<div id="passwordScreen">
    <h2>Enter Your Name ✨</h2>
    <input type="password" id="passwordInput">
    <button onclick="checkPassword()">Enter</button>
</div>

<!-- المحتوى -->
<div id="mainContent">
    
<button id="backBtn">back</button>
    
    <button class="mainBtn" id="startBtn">Click Here</button>
    <button class="mainBtn" id="thoughtsBtn">Thoughts🤍</button>

    <div id="counterSection">
        <span id="counter">0</span> Years
    </div>

    <div id="messageSection">
        <h5>Happy Birthday Touta 🎉</h5>
        <p class="specialMessage">
            كل عام وانتي بخير 🤍✨
        </p>
    </div>

    <div id="thoughtsSection">
        <h5>My Thoughts 🤍</h5>
        <p class="specialMessage">
            You are not just special... you are rare 🤍
        </p>
    </div>

</div>

<audio id="bgMusic" src="music.mp3" loop></audio>

<div class="signature">
    Made by Youcef for his one and only
</div>

<script>

// عناصر
let startBtn = document.getElementById("startBtn");
let thoughtsBtn = document.getElementById("thoughtsBtn");
let counterSection = document.getElementById("counterSection");
let messageSection = document.getElementById("messageSection");
let thoughtsSection = document.getElementById("thoughtsSection");
let counterElement = document.getElementById("counter");
    let backBtn = document.getElementById("backBtn");

// زر Click Here
startBtn.onclick = function() {
backBtn.style.display = "block";
    startBtn.style.display = "none";
    counterSection.style.display = "block";

    let count = 0;

    let interval = setInterval(() => {
        count++;
        counterElement.textContent = count;

        if (count === 21) {
            clearInterval(interval);

            counterSection.style.display = "none";
            messageSection.style.display = "block";

            confetti({ particleCount: 200, spread: 120 });
        }

    }, 150);
};

// زر Thoughts
thoughtsBtn.onclick = function() {
backBtn.style.display = "block";
    startBtn.style.display = "none";
    counterSection.style.display = "none";
    messageSection.style.display = "none";

    thoughtsSection.style.display = "block";

};

// القلوب
function createHeart() {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "🤍";

    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = "90%";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 2500);
}

// كلمة السر
const correctHash = "e2cf0dc86b19fa9bed2b62d0aa1217f5889d4ee4a17d073fd83c964cd46ced57";

async function sha256(message) {
    const buffer = new TextEncoder().encode(message);
    const hash = await crypto.subtle.digest("SHA-256", buffer);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function checkPassword() {
    const input = document.getElementById("passwordInput").value.toLowerCase();
    const hash = await sha256(input);

    if (hash === correctHash) {
        document.getElementById("passwordScreen").style.display = "none";
        document.getElementById("mainContent").style.display = "flex";

        let music = document.getElementById("bgMusic");
        music.volume = 0;
        music.play();

        let fade = setInterval(() => {
            if (music.volume < 0.3) music.volume += 0.02;
            else clearInterval(fade);
        }, 200);

    } else {
        alert("Wrong name 🙂");
    }
}


    backBtn.onclick = function() {

    counterSection.style.display = "none";
    messageSection.style.display = "none";
    thoughtsSection.style.display = "none";

    startBtn.style.display = "inline-block";
    thoughtsBtn.style.display = "inline-block";

    backBtn.style.display = "none";
};
</script>

</body>
</html>
